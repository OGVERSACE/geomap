<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoMap - Назначение участков</title>
    
    <script src="https://api-maps.yandex.ru/2.1/?apikey=6d4481ef-d298-4dfe-8c48-7a0e8d282d1a&lang=ru_RU" type="text/javascript"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; overflow: hidden; }
        .app { display: flex; flex-direction: column; height: 100vh; }
        .main-area { display: flex; flex: 1; overflow: hidden; }
        .map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; }
        
        /* КНОПКИ УПРАВЛЕНИЯ (ЛЕВЫЙ ВЕРХНИЙ УГОЛ) */
        .map-controls {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 100;
            display: flex;
            gap: 8px;
            background: white;
            padding: 6px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .map-controls button {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
            background: white;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .map-controls button:hover {
            background: #e0e0e0;
        }
        .map-controls button.active {
            background: #2196F3;
            color: white;
        }
        
        /* ФИЛЬТР ПО ЭТАЖАМ */
        .filter-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 100;
            background: white;
            padding: 8px 12px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
        }
        .filter-panel input {
            width: 60px;
            padding: 4px 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: center;
        }
        .filter-panel button {
            padding: 4px 10px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .filter-panel button:hover {
            background: #0b7dda;
        }
        
        /* ИНФОРМАЦИЯ О РАССТОЯНИИ */
        .distance-info {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            display: none;
        }
        .distance-controls {
            position: absolute;
            bottom: 80px;
            right: 20px;
            z-index: 100;
            display: none;
            gap: 8px;
        }
        .distance-controls button {
            background: white;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .distance-controls button:hover {
            background: #f0f0f0;
        }
        
        .right-panel {
            width: 320px;
            background: white;
            padding: 14px;
            box-shadow: -2px 0 8px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }
        
        .bottom-panel {
            background: white;
            border-top: 1px solid #e0e0e0;
            padding: 8px 16px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        
        .bottom-left, .bottom-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 6px;
            padding: 5px 12px;
            text-align: center;
            cursor: pointer;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .upload-area:hover { border-color: #4CAF50; background: #f9f9f9; }
        
        button { padding: 5px 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 11px; }
        .btn-primary { background: #4CAF50; color: white; }
        .btn-secondary { background: #2196F3; color: white; }
        .btn-warning { background: #ff9800; color: white; }
        .btn-purple { background: #9c27b0; color: white; }
        .btn-outline { background: white; color: #2196F3; border: 1px solid #2196F3; }
        
        .stats { background: #f5f5f5; padding: 4px 12px; border-radius: 6px; font-size: 11px; display: inline-flex; gap: 12px; }
        .stats-item { display: inline-flex; align-items: center; gap: 4px; }
        .stats-number { font-weight: bold; color: #2196F3; font-size: 13px; }
        
        /* УВЕЛИЧЕННЫЕ ПОЛЯ */
        .plot-selector, .plot-filter { 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            background: #f5f5f5; 
            padding: 5px 12px; 
            border-radius: 6px; 
        }
        .plot-selector input, .plot-filter input { 
            width: 140px; 
            padding: 6px 10px; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            font-size: 13px; 
        }
        .plot-selector button, .plot-filter button {
            padding: 6px 14px;
            font-size: 12px;
        }
        
        .current-selection, .apt-summary { padding: 4px 10px; border-radius: 5px; font-size: 11px; display: inline-flex; align-items: center; gap: 4px; }
        .current-selection { background: #e8f5e9; color: #666; }
        .apt-summary { background: #e3f2fd; font-weight: bold; }
        
        .address-list { flex: 1; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; background: #fafafa; }
        .address-item { padding: 8px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 11px; }
        .address-item:hover { background: #f0f0f0; }
        .address-item.selected { background: #e3f2fd; }
        .address-item.success { border-left: 3px solid #4CAF50; }
        .address-item.error { border-left: 3px solid #f44336; }
        .address-item.highlight { background: #fff3e0; border-left: 3px solid #ff9800; }
        .address-plot { font-size: 9px; color: #666; margin-top: 3px; }
        
        .loading { display: none; text-align: center; padding: 6px 12px; background: #fff3cd; border-radius: 6px; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; font-size: 11px; }
        .progress-bar { width: 200px; height: 10px; background: #e0e0e0; border-radius: 5px; overflow: hidden; margin: 4px 0; }
        .progress-fill { height: 100%; background: #4CAF50; transition: width 0.3s; }
        
        h2, h3 { font-size: 13px; margin: 0; }
        .small-text { font-size: 9px; color: #666; }
        .address-checkbox { margin-right: 6px; transform: scale(0.8); }
        .flex-row { display: flex; align-items: flex-start; gap: 6px; }
        .address-content { flex: 1; }
        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .separator { width: 1px; height: 25px; background: #ddd; }
    </style>
</head>
<body>
<div class="app">
    <div class="main-area">
        <div class="map-container">
            <div id="map"></div>
            
            <!-- КНОПКИ УПРАВЛЕНИЯ -->
            <div class="map-controls">
                <button id="rulerBtn" title="Измерить расстояние">📏</button>
            </div>
            
            <!-- ФИЛЬТР ПО ЭТАЖАМ -->
            <div class="filter-panel">
                <span>🏢 Этажи:</span>
                <input type="number" id="floorsFilter" value="0" min="0" step="1">
                <button id="applyFilterBtn">Показать</button>
                <button id="resetFilterBtn" class="btn-outline" style="padding: 4px 8px;">Сброс</button>
            </div>
            
            <!-- ИНФОРМАЦИЯ О РАССТОЯНИИ -->
            <div class="distance-info" id="distanceInfo"></div>
            <div class="distance-controls" id="distanceControls">
                <button id="clearRulerBtn">🗑️ Очистить метки</button>
            </div>
        </div>
        
        <div class="right-panel" id="rightPanel">
            <div class="list-header">
                <h3>📋 Список адресов</h3>
                <div><button class="btn-secondary" id="selectAllBtn">✅ Все</button> <button class="btn-warning" id="deselectAllBtn">⬜ Снять</button></div>
            </div>
            <div class="address-list" id="addressList"></div>
            <div class="small-text" style="text-align:center;">💡 Клик по адресу — центрирование</div>
        </div>
    </div>
    <div class="bottom-panel" id="bottomPanel">
        <div class="bottom-left">
            <h2>🗺️ GeoMap</h2>
            <div class="upload-area" id="uploadArea">📁 Загрузить Excel</div>
            <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
            <div class="stats">
                <div class="stats-item">📊 <span class="stats-number" id="totalCount">0</span></div>
                <div class="stats-item">📍 <span class="stats-number" id="mapCount">0</span></div>
                <div class="stats-item">🏷️ <span class="stats-number" id="assignedCount">0</span></div>
                <div class="stats-item">⚠️ <span class="stats-number" id="duplicateCount" style="color:#f44336;">0</span></div>
            </div>
        </div>
        <div class="bottom-right">
            <div class="plot-filter">
                <label>🔍</label>
                <input type="text" id="plotFilterInput" placeholder="Выберите участок" list="plotList">
                <datalist id="plotList"></datalist>
                <button class="btn-outline" id="filterPlotBtn">Найти</button>
                <button class="btn-warning" id="clearFilterBtn" style="display:none;">✖️</button>
            </div>
            <div class="plot-selector">
                <label>🎯</label>
                <input type="text" id="plotInput" placeholder="Номер участка" list="plotListAssign">
                <datalist id="plotListAssign"></datalist>
                <button class="btn-primary" id="assignPlotBtn">Назначить</button>
            </div>
            <div class="apt-summary">🏢 <span id="selectedAptSum">0</span></div>
            <div class="current-selection">✅ <span id="selectedCount">0</span></div>
            <div class="separator"></div>
            <button class="btn-purple" id="getLinkBtn">🔗 Ссылка</button>
            <button class="btn-secondary" id="exportExcelBtn">📎 Excel</button>
        </div>
    </div>
</div>

<div class="loading" id="loading"><span>⏳</span><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div><span id="progressText">0/0</span></div>

<script src="geocoder.js"></script>
<script src="app.js"></script>
</body>
</html>
