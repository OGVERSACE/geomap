<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoMap - Назначение участков</title>
    
    <!-- Яндекс.Карты (вставьте ваш ключ) -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=6d4481ef-d298-4dfe-8c48-7a0e8d282d1a&lang=ru_RU" type="text/javascript"></script>
    
    <!-- Библиотека для работы с Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ОСНОВНАЯ ОБЛАСТЬ (КАРТА + ПРАВАЯ ПАНЕЛЬ) */
        .main-area {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ЦЕНТРАЛЬНАЯ ЧАСТЬ (КАРТА) */
        .map-container {
            flex: 1;
            position: relative;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        /* ПРАВАЯ ПАНЕЛЬ (СПИСОК АДРЕСОВ - 260px) */
        .right-panel {
            width: 260px;
            background: white;
            padding: 12px;
            box-shadow: -2px 0 8px rgba(0,0,0,0.08);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        /* НИЖНЯЯ ПАНЕЛЬ (МЕНЮ) */
        .bottom-panel {
            background: white;
            border-top: 1px solid #e0e0e0;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.05);
            z-index: 20;
            padding: 10px 16px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        /* ЛЕВАЯ ЧАСТЬ НИЖНЕЙ ПАНЕЛИ (ЗАГРУЗКА + СТАТИСТИКА) */
        .bottom-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        /* ПРАВАЯ ЧАСТЬ НИЖНЕЙ ПАНЕЛИ (УЧАСТОК + КНОПКИ) */
        .bottom-right {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        /* ОБЩИЕ СТИЛИ */
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 6px;
            padding: 6px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .upload-area:hover {
            border-color: #4CAF50;
            background: #f9f9f9;
        }

        .upload-area.dragover {
            border-color: #4CAF50;
            background: #e8f5e9;
        }

        button {
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }
        .btn-primary:hover { background: #45a049; }

        .btn-secondary {
            background: #2196F3;
            color: white;
        }
        .btn-secondary:hover { background: #0b7dda; }

        .btn-warning {
            background: #ff9800;
            color: white;
        }
        .btn-warning:hover { background: #e68900; }

        .btn-purple {
            background: #9c27b0;
            color: white;
        }
        .btn-purple:hover { background: #7b1fa2; }

        .stats {
            background: #f5f5f5;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .stats-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .stats-number {
            font-weight: bold;
            color: #2196F3;
            font-size: 14px;
        }

        .plot-selector {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f5f5f5;
            padding: 4px 10px;
            border-radius: 6px;
        }

        .plot-selector input {
            width: 100px;
            padding: 5px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
        }

        .plot-selector label {
            font-weight: 600;
            font-size: 12px;
        }

        .current-selection {
            font-size: 12px;
            color: #666;
            background: #e8f5e9;
            padding: 4px 10px;
            border-radius: 5px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .apt-summary {
            background: #e3f2fd;
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .apt-summary span {
            color: #2196F3;
            font-size: 14px;
        }

        .address-list {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 6px;
            background: #fafafa;
        }

        .address-item {
            padding: 8px;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
            cursor: pointer;
            font-size: 11px;
        }

        .address-item:hover {
            background: #f0f0f0;
        }

        .address-item.selected {
            background: #e3f2fd;
        }

        .address-item.success {
            border-left: 3px solid #4CAF50;
        }

        .address-item.error {
            border-left: 3px solid #f44336;
        }

        .address-plot {
            font-size: 10px;
            color: #666;
            margin-top: 3px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 6px 12px;
            background: #fff3cd;
            border-radius: 5px;
            font-size: 11px;
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        .progress-bar {
            width: 200px;
            height: 12px;
            background: #e0e0e0;
            border-radius: 6px;
            overflow: hidden;
            margin: 4px 0;
        }

        .progress-fill {
            height: 100%;
            background: #4CAF50;
            transition: width 0.3s;
            width: 0%;
        }

        h2 {
            font-size: 14px;
            margin: 0;
        }

        h3 {
            font-size: 13px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .small-text {
            font-size: 10px;
            color: #666;
        }
        
        .address-checkbox {
            margin-top: 2px;
            margin-right: 6px;
            transform: scale(0.8);
        }

        .address-content {
            flex: 1;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .list-header h3 {
            margin-bottom: 0;
        }

        .list-actions {
            display: flex;
            gap: 5px;
        }

        .list-actions button {
            padding: 3px 8px;
            font-size: 10px;
        }

        .flex-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .separator {
            width: 1px;
            height: 30px;
            background: #ddd;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- ОСНОВНАЯ ОБЛАСТЬ (КАРТА + ПРАВАЯ ПАНЕЛЬ) -->
        <div class="main-area">
            <!-- КАРТА -->
            <div class="map-container">
                <div id="map"></div>
            </div>
            
            <!-- ПРАВАЯ ПАНЕЛЬ (СПИСОК АДРЕСОВ) -->
            <div class="right-panel">
                <div class="list-header">
                    <h3>📋 Список адресов</h3>
                    <div class="list-actions">
                        <button class="btn-secondary" id="selectAllBtn">✅ Все</button>
                        <button class="btn-warning" id="deselectAllBtn">⬜ Снять</button>
                    </div>
                </div>
                <div class="address-list" id="addressList"></div>
                <div class="small-text" style="margin-top: 6px; text-align: center;">
                    💡 Клик по адресу — центрирование
                </div>
            </div>
        </div>
        
        <!-- НИЖНЯЯ ПАНЕЛЬ (ВСЕ ЭЛЕМЕНТЫ УПРАВЛЕНИЯ) -->
        <div class="bottom-panel">
            <div class="bottom-left">
                <h2>🗺️ GeoMap</h2>
                <div class="upload-area" id="uploadArea">
                    📁 Загрузить Excel
                </div>
                <input type="file" id="fileInput" accept=".xlsx,.xls" style="display: none;">
                
                <div class="stats" id="stats">
                    <div class="stats-item">📊 Всего: <span class="stats-number" id="totalCount">0</span></div>
                    <div class="stats-item">📍 На карте: <span class="stats-number" id="mapCount">0</span></div>
                    <div class="stats-item">🏷️ С участком: <span class="stats-number" id="assignedCount">0</span></div>
                    <div class="stats-item">⚠️ Дубл.: <span class="stats-number" id="duplicateCount" style="color:#f44336;">0</span></div>
                </div>
            </div>
            
            <div class="bottom-right">
                <div class="plot-selector">
                    <label>🎯 Участок:</label>
                    <input type="text" id="plotInput" placeholder="Номер">
                    <button class="btn-primary" id="assignPlotBtn">📌 Назначить</button>
                </div>
                
                <div class="apt-summary" id="aptSummary">
                    🏢 Сумма квартир: <span id="selectedAptSum">0</span>
                </div>
                
                <div class="current-selection" id="currentSelection">
                    ✅ Выбрано: <span id="selectedCount">0</span>
                </div>
                
                <div class="separator"></div>
                
                <button class="btn-purple" id="getLinkBtn">🔗 Получить ссылку</button>
                <button class="btn-secondary" id="exportExcelBtn">📎 Выгрузить Excel</button>
            </div>
        </div>
    </div>
    
    <!-- ПРОГРЕСС-БАР (ПЛАВАЮЩИЙ) -->
    <div class="loading" id="loading">
        ⏳ Обработка адресов...<br>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <span id="progressText">0/0</span>
    </div>
    
    <script src="geocoder.js"></script>
    <script src="app.js"></script>
</body>
</html>
