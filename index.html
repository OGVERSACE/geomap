<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GeoMap - Назначение участков</title>
    
    <script src="https://api-maps.yandex.ru/2.1/?apikey=6d4481ef-d298-4dfe-8c48-7a0e8d282d1a&lang=ru_RU" type="text/javascript"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; overflow: hidden; }
        .app { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        .main-area { display: flex; flex: 1; overflow: hidden; }
        .map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; }
        
        /* АДАПТИВНАЯ ПРАВАЯ ПАНЕЛЬ */
        .right-panel {
            background: white;
            padding: 14px;
            box-shadow: -2px 0 8px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            transition: all 0.2s ease;
        }
        
        .right-panel.hidden { display: none; }
        
        .bottom-panel {
            background: white;
            border-top: 1px solid #e0e0e0;
            padding: 8px 16px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .bottom-panel.hidden { display: none; }
        
        .bottom-left, .bottom-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        
        /* КНОПКИ */
        .control-buttons {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 200;
            display: flex;
            gap: 10px;
        }
        .control-btn {
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 8px;
            width: 44px;
            height: 44px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .control-btn:hover { background: #0b7dda; transform: scale(1.05); }
        .control-btn.red { background: #f44336; }
        .control-btn.green { background: #4CAF50; }
        
        .toggle-right-btn {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 80px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 8px 0 0 8px;
            font-size: 14px;
            cursor: pointer;
            z-index: 200;
            writing-mode: vertical-rl;
        }
        .toggle-right-btn:hover { background: #0b7dda; width: 38px; }
        
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 6px;
            padding: 5px 12px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .upload-area:hover { border-color: #4CAF50; background: #f9f9f9; }
        
        button { padding: 5px 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .btn-primary { background: #4CAF50; color: white; }
        .btn-secondary { background: #2196F3; color: white; }
        .btn-warning { background: #ff9800; color: white; }
        .btn-purple { background: #9c27b0; color: white; }
        .btn-outline { background: white; color: #2196F3; border: 1px solid #2196F3; }
        
        .stats { background: #f5f5f5; padding: 4px 12px; border-radius: 6px; font-size: 11px; display: inline-flex; gap: 12px; }
        .stats-item { display: inline-flex; align-items: center; gap: 4px; }
        .stats-number { font-weight: bold; color: #2196F3; font-size: 13px; }
        
        .plot-selector, .plot-filter { display: inline-flex; align-items: center; gap: 6px; background: #f5f5f5; padding: 4px 10px; border-radius: 6px; }
        .plot-selector input, .plot-filter input { width: 80px; padding: 4px 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 11px; }
        
        .current-selection, .apt-summary { padding: 4px 10px; border-radius: 5px; font-size: 11px; display: inline-flex; align-items: center; gap: 4px; }
        .current-selection { background: #e8f5e9; color: #666; }
        .apt-summary { background: #e3f2fd; font-weight: bold; }
        
        .address-list { flex: 1; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; background: #fafafa; max-height: 100%; }
        .address-item { padding: 8px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 11px; }
        .address-item:hover { background: #f0f0f0; }
        .address-item.selected { background: #e3f2fd; }
        .address-item.success { border-left: 3px solid #4CAF50; }
        .address-item.error { border-left: 3px solid #f44336; }
        .address-plot { font-size: 9px; color: #666; margin-top: 3px; }
        
        .loading { display: none; text-align: center; padding: 6px 12px; background: #fff3cd; border-radius: 6px; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; font-size: 11px; }
        .progress-bar { width: 200px; height: 10px; background: #e0e0e0; border-radius: 5px; overflow: hidden; margin: 4px 0; }
        .progress-fill { height: 100%; background: #4CAF50; transition: width 0.3s; }
        
        h2, h3 { font-size: 13px; margin: 0; }
        .small-text { font-size: 9px; color: #666; }
        .address-checkbox { margin-right: 6px; transform: scale(0.8); }
        .flex-row { display: flex; align-items: flex-start; gap: 6px; }
        .address-content { flex: 1; }
        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .separator { width: 1px; height: 25px; background: #ddd; }
        
        @media (max-width: 768px) {
            .plot-selector input, .plot-filter input { width: 60px; }
            .stats { gap: 8px; }
            .bottom-left, .bottom-right { gap: 8px; }
            .control-buttons { bottom: 10px; left: 10px; gap: 6px; }
            .control-btn { width: 36px; height: 36px; font-size: 14px; }
            .toggle-right-btn { width: 28px; height: 60px; font-size: 11px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="main-area">
        <div class="map-container"><div id="map"></div></div>
        <div class="right-panel" id="rightPanel">
            <div class="list-header">
                <h3>📋 Список адресов</h3>
                <div><button class="btn-secondary" id="selectAllBtn">✅ Все</button> <button class="btn-warning" id="deselectAllBtn">⬜ Снять</button></div>
            </div>
            <div class="address-list" id="addressList"></div>
            <div class="small-text" style="text-align:center;">💡 Клик по адресу — центрирование</div>
        </div>
    </div>
    <div class="bottom-panel" id="bottomPanel">
        <div class="bottom-left">
            <h2>🗺️ GeoMap</h2>
            <div class="upload-area" id="uploadArea">📁 Загрузить Excel</div>
            <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
            <div class="stats">
                <div class="stats-item">📊 <span class="stats-number" id="totalCount">0</span></div>
                <div class="stats-item">📍 <span class="stats-number" id="mapCount">0</span></div>
                <div class="stats-item">🏷️ <span class="stats-number" id="assignedCount">0</span></div>
                <div class="stats-item">⚠️ <span class="stats-number" id="duplicateCount" style="color:#f44336;">0</span></div>
            </div>
        </div>
        <div class="bottom-right">
            <div class="plot-filter"><label>🔍</label><input type="text" id="plotFilterInput" placeholder="Участок"><button class="btn-outline" id="filterPlotBtn">Найти</button><button class="btn-warning" id="clearFilterBtn" style="display:none;">✖️</button></div>
            <div class="plot-selector"><label>🎯</label><input type="text" id="plotInput" placeholder="Номер"><button class="btn-primary" id="assignPlotBtn">Назначить</button></div>
            <div class="apt-summary">🏢 <span id="selectedAptSum">0</span></div>
            <div class="current-selection">✅ <span id="selectedCount">0</span></div>
            <div class="separator"></div>
            <button class="btn-purple" id="getLinkBtn">🔗</button>
            <button class="btn-secondary" id="exportExcelBtn">📎</button>
        </div>
    </div>
</div>

<div class="control-buttons">
    <button class="control-btn" id="toggleBottomBtn" title="Нижняя панель">▲</button>
    <button class="control-btn" id="resetViewBtn" title="Центрировать карту">⌂</button>
    <button class="control-btn green" id="showAllBtn" title="Показать всё">☰</button>
</div>
<button class="toggle-right-btn" id="toggleRightBtn">СПИСОК</button>

<div class="loading" id="loading"><span>⏳</span><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div><span id="progressText">0/0</span></div>

<script src="geocoder.js"></script>
<script src="app.js"></script>

<script>
    (function() {
        const rightPanel = document.getElementById('rightPanel');
        const bottomPanel = document.getElementById('bottomPanel');
        const toggleRightBtn = document.getElementById('toggleRightBtn');
        const toggleBottomBtn = document.getElementById('toggleBottomBtn');
        const showAllBtn = document.getElementById('showAllBtn');
        const resetViewBtn = document.getElementById('resetViewBtn');
        
        // Функция адаптивной ширины
        function setAdaptiveWidth() {
            if (!rightPanel) return;
            if (rightPanel.classList.contains('hidden')) return;
            
            const w = window.innerWidth;
            let width = 300;
            if (w >= 1200) width = 350;
            else if (w >= 768) width = 280;
            else width = 240;
            
            rightPanel.style.width = width + 'px';
            console.log(`Адаптивная ширина: ${width}px (экран ${w}px)`);
        }
        
        // Принудительное восстановление
        function forceRestore() {
            if (rightPanel) {
                rightPanel.classList.remove('hidden');
                rightPanel.style.display = 'flex';
                rightPanel.style.visibility = 'visible';
                setAdaptiveWidth();
            }
            if (bottomPanel) bottomPanel.classList.remove('hidden');
            if (toggleRightBtn) {
                toggleRightBtn.innerHTML = '◀';
                toggleRightBtn.style.background = '#2196F3';
            }
            if (toggleBottomBtn) {
                toggleBottomBtn.innerHTML = '▲';
                toggleBottomBtn.style.background = '#2196F3';
            }
            setTimeout(() => {
                if (window.map && window.map.container) window.map.container.fitToViewport();
            }, 100);
        }
        
        let rightVisible = true, bottomVisible = true;
        
        if (toggleRightBtn && rightPanel) {
            toggleRightBtn.onclick = function(e) {
                e.preventDefault();
                if (rightVisible) {
                    rightPanel.classList.add('hidden');
                    rightPanel.style.display = 'none';
                    toggleRightBtn.innerHTML = '▶';
                    toggleRightBtn.style.background = '#f44336';
                    rightVisible = false;
                } else {
                    rightPanel.classList.remove('hidden');
                    rightPanel.style.display = 'flex';
                    setAdaptiveWidth();
                    toggleRightBtn.innerHTML = '◀';
                    toggleRightBtn.style.background = '#2196F3';
                    rightVisible = true;
                }
                setTimeout(() => { if (window.map && window.map.container) window.map.container.fitToViewport(); }, 100);
            };
        }
        
        if (toggleBottomBtn && bottomPanel) {
            toggleBottomBtn.onclick = function(e) {
                e.preventDefault();
                if (bottomVisible) {
                    bottomPanel.classList.add('hidden');
                    toggleBottomBtn.innerHTML = '▼';
                    toggleBottomBtn.style.background = '#f44336';
                    bottomVisible = false;
                } else {
                    bottomPanel.classList.remove('hidden');
                    toggleBottomBtn.innerHTML = '▲';
                    toggleBottomBtn.style.background = '#2196F3';
                    bottomVisible = true;
                }
                setTimeout(() => { if (window.map && window.map.container) window.map.container.fitToViewport(); }, 100);
            };
        }
        
        if (showAllBtn) showAllBtn.onclick = forceRestore;
        if (resetViewBtn && window.map) resetViewBtn.onclick = () => window.map.setCenter([55.751244, 37.618423], 10);
        
        window.addEventListener('resize', () => { if (rightPanel && !rightPanel.classList.contains('hidden')) setAdaptiveWidth(); });
        setTimeout(forceRestore, 300);
        window.fixPanels = forceRestore;
    })();
</script>
</body>
</html>
