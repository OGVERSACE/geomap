<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoMap - Назначение участков</title>
    
    <!-- Яндекс.Карты (вставьте ваш ключ) -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=6d4481ef-d298-4dfe-8c48-7a0e8d282d1a&lang=ru_RU" type="text/javascript"></script>
    
    <!-- Библиотека для работы с Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* ЛЕВАЯ ПАНЕЛЬ (УЗКАЯ) */
        .left-panel {
            width: 280px;
            background: white;
            padding: 16px;
            box-shadow: 2px 0 8px rgba(0,0,0,0.08);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }

        /* ЦЕНТРАЛЬНАЯ ЧАСТЬ (КАРТА) */
        .map-container {
            flex: 1;
            position: relative;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        /* ПРАВАЯ ПАНЕЛЬ (СПИСОК АДРЕСОВ) */
        .right-panel {
            width: 360px;
            background: white;
            padding: 16px;
            box-shadow: -2px 0 8px rgba(0,0,0,0.08);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }

        /* ОБЩИЕ СТИЛИ */
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }

        .upload-area:hover {
            border-color: #4CAF50;
            background: #f9f9f9;
        }

        .upload-area.dragover {
            border-color: #4CAF50;
            background: #e8f5e9;
        }

        button {
            padding: 8px 12px;
            margin: 3px 0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }
        .btn-primary:hover { background: #45a049; }

        .btn-secondary {
            background: #2196F3;
            color: white;
        }
        .btn-secondary:hover { background: #0b7dda; }

        .btn-warning {
            background: #ff9800;
            color: white;
        }
        .btn-warning:hover { background: #e68900; }

        .btn-purple {
            background: #9c27b0;
            color: white;
        }
        .btn-purple:hover { background: #7b1fa2; }

        .stats {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        .stat-card {
            background: white;
            padding: 6px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-number {
            font-size: 18px;
            font-weight: bold;
            color: #2196F3;
        }

        .address-list {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 8px;
            background: #fafafa;
        }

        .address-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
            cursor: pointer;
        }

        .address-item:hover {
            background: #f0f0f0;
        }

        .address-item.selected {
            background: #e3f2fd;
        }

        .address-item.success {
            border-left: 3px solid #4CAF50;
        }

        .address-item.error {
            border-left: 3px solid #f44336;
        }

        .address-plot {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 10px;
            background: #fff3cd;
            border-radius: 6px;
            font-size: 13px;
        }

        .progress-bar {
            width: 100%;
            height: 16px;
            background: #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-fill {
            height: 100%;
            background: #4CAF50;
            transition: width 0.3s;
            width: 0%;
        }

        .plot-selector {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 8px;
        }

        .plot-selector input {
            width: 100%;
            padding: 8px;
            margin: 6px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            box-sizing: border-box;
        }

        .plot-selector label {
            font-weight: 600;
            font-size: 12px;
        }

        .current-selection {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            padding: 6px;
            background: #e8f5e9;
            border-radius: 6px;
        }

        .apt-summary {
            background: #e3f2fd;
            padding: 8px;
            border-radius: 6px;
            margin-top: 8px;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
        }

        .apt-summary span {
            color: #2196F3;
            font-size: 16px;
        }

        h3 {
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        hr {
            margin: 10px 0;
        }

        .button-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .button-group button {
            flex: 1;
            min-width: 70px;
            font-size: 12px;
        }

        .small-text {
            font-size: 10px;
            color: #666;
        }
        
        .address-checkbox {
            margin-top: 2px;
            margin-right: 8px;
        }

        .address-content {
            flex: 1;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .list-header h3 {
            margin-bottom: 0;
        }

        .list-actions {
            display: flex;
            gap: 6px;
        }

        .list-actions button {
            padding: 4px 8px;
            font-size: 11px;
        }

        .pin-preview {
            width: 24px;
            height: 24px;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- ЛЕВАЯ ПАНЕЛЬ (УЗКАЯ) -->
        <div class="left-panel">
            <h2>🗺️ GeoMap</h2>
            <p class="small-text">Загрузка адресов и назначение участков</p>
            
            <div class="upload-area" id="uploadArea">
                📁 Нажмите или перетащите файл Excel<br>
                <small>(.xlsx, .xls)</small>
            </div>
            <input type="file" id="fileInput" accept=".xlsx,.xls" style="display: none;">
            
            <div class="loading" id="loading">
                ⏳ Обработка адресов...<br>
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <span id="progressText">0/0</span>
            </div>
            
            <div class="plot-selector">
                <label>🎯 Назначить участок выбранным точкам:</label>
                <input type="text" id="plotInput" placeholder="Введите номер участка (например: 1, 15, Участок А)">
                <button class="btn-primary" id="assignPlotBtn" style="width: 100%;">📌 Назначить участок</button>
                
                <div class="apt-summary" id="aptSummary">
                    📊 Сумма квартир: <span id="selectedAptSum">0</span>
                </div>
                
                <div class="current-selection" id="currentSelection">
                    📌 Выбрано адресов: <span id="selectedCount">0</span>
                </div>
            </div>
            
            <div class="button-group">
                <button class="btn-purple" id="getLinkBtn">🔗 Получить ссылку</button>
                <button class="btn-secondary" id="exportExcelBtn">📎 Выгрузить Excel</button>
            </div>
            
            <div class="stats" id="stats">
                <strong>📊 Статистика:</strong>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div>Всего адресов</div>
                        <div class="stat-number" id="totalCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div>На карте</div>
                        <div class="stat-number" id="mapCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div>С участками</div>
                        <div class="stat-number" id="assignedCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div>⚠️ Дубликаты</div>
                        <div class="stat-number" id="duplicateCount" style="color: #f44336;">0</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- ЦЕНТРАЛЬНАЯ ЧАСТЬ (КАРТА) -->
        <div class="map-container">
            <div id="map"></div>
        </div>
        
        <!-- ПРАВАЯ ПАНЕЛЬ (СПИСОК АДРЕСОВ) -->
        <div class="right-panel">
            <div class="list-header">
                <h3>📋 Список адресов</h3>
                <div class="list-actions">
                    <button class="btn-secondary" id="selectAllBtn" style="padding: 4px 8px; font-size: 11px;">✅ Все</button>
                    <button class="btn-warning" id="deselectAllBtn" style="padding: 4px 8px; font-size: 11px;">⬜ Снять</button>
                </div>
            </div>
            <div class="address-list" id="addressList"></div>
            <div class="small-text" style="margin-top: 8px; text-align: center;">
                💡 Клик по адресу — центрирование карты
            </div>
        </div>
    </div>
    
    <script src="geocoder.js"></script>
    <script src="app.js"></script>
</body>
</html>
