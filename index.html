<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoMap - назначение участков</title>
    
    <script src="https://api-maps.yandex.ru/2.1/?apikey=6d4481ef-d298-4dfe-8c48-7a0e8d282d1a&lang=ru_RU" type="text/javascript"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 380px; background: white; padding: 20px; box-shadow: 2px 0 5px rgba(0,0,0,0.1); overflow-y: auto; z-index: 10; display: flex; flex-direction: column; gap: 15px; }
        .map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; }
        .upload-area { border: 2px dashed #ccc; border-radius: 8px; padding: 15px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .upload-area:hover { border-color: #4CAF50; background: #f9f9f9; }
        .upload-area.dragover { border-color: #4CAF50; background: #e8f5e9; }
        button { padding: 10px; margin: 3px 0; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .btn-primary { background: #4CAF50; color: white; }
        .btn-primary:hover { background: #45a049; }
        .btn-secondary { background: #2196F3; color: white; }
        .btn-secondary:hover { background: #0b7dda; }
        .btn-warning { background: #ff9800; color: white; }
        .btn-warning:hover { background: #e68900; }
        .btn-danger { background: #f44336; color: white; }
        .btn-danger:hover { background: #da190b; }
        .stats { background: #f5f5f5; padding: 10px; border-radius: 5px; font-size: 13px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
        .stat-card { background: white; padding: 8px; border-radius: 5px; text-align: center; }
        .stat-number { font-size: 20px; font-weight: bold; color: #2196F3; }
        .address-list { max-height: 280px; overflow-y: auto; border: 1px solid #eee; border-radius: 5px; }
        .address-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; transition: background 0.2s; }
        .address-item:hover { background: #f0f0f0; }
        .address-item.selected { background: #e3f2fd; border-left: 3px solid #2196F3; }
        .address-item.success { border-left: 3px solid #4CAF50; }
        .address-item.error { border-left: 3px solid #f44336; }
        .address-plot { font-size: 11px; color: #666; margin-top: 4px; }
        .loading { display: none; text-align: center; padding: 10px; background: #fff3cd; border-radius: 5px; }
        .progress-bar { width: 100%; height: 20px; background: #e0e0e0; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: #4CAF50; transition: width 0.3s; width: 0%; }
        .plot-selector { background: #f5f5f5; padding: 12px; border-radius: 5px; margin: 10px 0; }
        .plot-selector select { width: 100%; padding: 8px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .plot-selector label { font-weight: bold; font-size: 13px; }
        .current-selection { font-size: 12px; color: #666; margin-top: 8px; padding: 5px; background: #e8f5e9; border-radius: 4px; }
        h3 { font-size: 16px; margin-bottom: 8px; }
        hr { margin: 10px 0; }
        .button-group { display: flex; gap: 8px; }
        .button-group button { flex: 1; }
        .small-text { font-size: 11px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>🗺️ GeoMap - Назначение участков</h2>
            
            <div class="upload-area" id="uploadArea">
                📁 Нажмите или перетащите файл Excel<br>
                <small>(.xlsx, .xls)</small>
            </div>
            <input type="file" id="fileInput" accept=".xlsx,.xls" style="display: none;">
            
            <div class="loading" id="loading">
                ⏳ Обработка адресов...<br>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span id="progressText">0/0</span>
            </div>
            
            <div class="plot-selector">
                <label>🎯 Назначить участок выбранной точке:</label>
                <select id="plotSelect">
                    <option value="">-- Выберите участок --</option>
                    <option value="Участок 1">Участок №1</option>
                    <option value="Участок 2">Участок №2</option>
                    <option value="Участок 3">Участок №3</option>
                    <option value="Участок 4">Участок №4</option>
                    <option value="Участок 5">Участок №5</option>
                </select>
                <button class="btn-primary" id="assignPlotBtn" style="margin-top: 8px;">✅ Назначить участок</button>
                <div class="current-selection" id="currentSelection">Ничего не выбрано</div>
            </div>
            
            <div class="button-group">
                <button class="btn-secondary" id="exportExcelBtn">📎 Выгрузить Excel с участками</button>
                <button class="btn-warning" id="clearMarkersBtn">🗑️ Очистить всё</button>
            </div>
            
            <div class="stats" id="stats">
                <strong>📊 Статистика:</strong>
                <div class="stats-grid">
                    <div class="stat-card"><div>Всего адресов</div><div class="stat-number" id="totalCount">0</div></div>
                    <div class="stat-card"><div>На карте</div><div class="stat-number" id="mapCount">0</div></div>
                    <div class="stat-card"><div>С назначенными участками</div><div class="stat-number" id="assignedCount">0</div></div>
                    <div class="stat-card"><div>Не найдено</div><div class="stat-number" id="errorCount">0</div></div>
                </div>
            </div>
            
            <h3>📋 Список адресов</h3>
            <div class="address-list" id="addressList"></div>
            <div class="small-text" style="margin-top: 8px;">💡 Клик по адресу или маркеру — для выбора</div>
        </div>
        
        <div class="map-container">
            <div id="map"></div>
        </div>
    </div>
    
    <script src="geocoder.js"></script>
    <script src="app.js"></script>
</body>
</html>
